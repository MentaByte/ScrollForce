<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activación - Scroll Force</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      padding: 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #333;
    }
    
    p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #000;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .error {
      background: #fee;
      border: 1px solid #fcc;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
      color: #c33;
    }
    
    .success {
      background: #efe;
      border: 1px solid #cfc;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
      color: #3c3;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🎬</div>
    <h1>Activando acceso...</h1>
    <p>Por favor espera mientras validamos tu código de Scroll Force.</p>
    <div class="loader"></div>
    <div id="message"></div>
  </div>

  <script>
    /* ================================================
       ACTIVACIÓN ULTRA-COMPATIBLE
       ✅ Safari iOS 10+, sin ES6
       =============================================== */
    
    var messageEl = document.getElementById("message");
    
    var SUPABASE_URL = "https://zgatennqbagmyfbpiakr.supabase.co";
    var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnYXRlbm5xYmFnbXlmYnBpYWtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwMTg3NTEsImV4cCI6MjA4NjU5NDc1MX0.5c_IoL3_PM1zwFsuvblkoCoWbP9-4BSaMcIwSasLprw";

    function getDeviceId() {
      var id = localStorage.getItem("device_id");
      if (!id) {
        id = 'xxxxxxxxxxxx4xxxyxxxxxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
          var r = Math.random() * 16 | 0;
          var v = c === 'x' ? r : (r & 0x3 | 0x8);
          return v.toString(16);
        });
        localStorage.setItem("device_id", id);
      }
      return id;
    }

    function activateLicense(code, callback) {
      var device_id = getDeviceId();
      var xhr = new XMLHttpRequest();
      
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            try {
              var result = JSON.parse(xhr.responseText);
              callback(null, result);
            } catch (e) {
              callback(e, null);
            }
          } else {
            callback(new Error("Error de conexión"), null);
          }
        }
      };
      
      xhr.open("POST", SUPABASE_URL + "/functions/v1/activate", true);
      xhr.setRequestHeader("Content-Type", "application/json");
      xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_ANON_KEY);
      xhr.send(JSON.stringify({ code: code, device_id: device_id }));
    }

    function saveSession(token) {
      localStorage.setItem("session_token", token);
      localStorage.setItem("last_known_status", "valid");
    }

    function getQueryParam(name) {
      var url = window.location.href;
      name = name.replace(/[\[\]]/g, '\\$&');
      var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)');
      var results = regex.exec(url);
      if (!results) return null;
      if (!results[2]) return '';
      return decodeURIComponent(results[2].replace(/\+/g, ' '));
    }

    var code = getQueryParam("k");

    if (!code) {
      document.querySelector('h1').textContent = 'Acceso no válido';
      document.querySelector('p').textContent = 'No se proporcionó un código de activación.';
      document.querySelector('.loader').style.display = 'none';
      document.querySelector('.icon').textContent = '⚠️';
    } else {
      activateLicense(code, function(error, result) {
        if (error) {
          document.querySelector('.loader').style.display = 'none';
          document.querySelector('.icon').textContent = '⚠️';
          document.querySelector('h1').textContent = 'Error de conexión';
          document.querySelector('p').textContent = 'No se pudo conectar con el servidor.';
          
          messageEl.className = 'error';
          messageEl.textContent = 'Error: ' + error.message;
        } else if (result.session_token) {
          saveSession(result.session_token);
          document.querySelector('h1').textContent = '¡Activado!';
          document.querySelector('p').textContent = 'Redirigiendo a Scroll Force...';
          document.querySelector('.loader').style.display = 'none';
          document.querySelector('.icon').textContent = '✅';
          
          messageEl.className = 'success';
          messageEl.textContent = 'Tu acceso ha sido activado correctamente.';
          
          setTimeout(function() {
            window.location.replace("./core/");
          }, 800);
        } else {
          document.querySelector('.loader').style.display = 'none';
          document.querySelector('.icon').textContent = '❌';
          
          var mensajes = {
            invalid_code: "El código no existe o no es válido.",
            revoked: "Este acceso ha sido revocado.",
            device_mismatch: "Este código ya está activo en otro dispositivo."
          };
          
          document.querySelector('h1').textContent = 'Error de activación';
          document.querySelector('p').textContent = mensajes[result.error] || "Error desconocido.";
          
          messageEl.className = 'error';
          messageEl.textContent = 'No se pudo activar tu acceso. Contacta al administrador.';
        }
      });
    }
  </script>
</body>
</html>
